name: Deploy docs to gh-pages

# Builds the VitePress site under docs/ and pushes the static output to the
# gh-pages branch. Repo Settings -> Pages -> Source must be set to:
#   Deploy from a branch -> gh-pages / (root)
# (One-time setup after this workflow first runs and creates the branch.)
on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
      - 'package.json'
      - 'package-lock.json'
  # Manual re-deploy without a code change.
  workflow_dispatch:

# One in-flight deploy at a time; cancel queued runs from older pushes.
concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # peaceiris/actions-gh-pages pushes to the gh-pages branch
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so lastUpdated frontmatter resolves

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build VitePress site
        run: npm run docs:build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/.vitepress/dist
          publish_branch: gh-pages
          # Every deploy writes a single orphan commit, replacing the entire
          # gh-pages history. Without this the branch grows forever (built
          # dist tree appended on every push). Master is never touched
          # either way — gh-pages is a sibling branch, not a descendant.
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'docs: deploy from ${{ github.sha }}'
