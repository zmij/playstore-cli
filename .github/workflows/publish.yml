name: Publish to npm

# Publishes playstore-flow to npm on every tag push matching v* (e.g.
# v1.0.0, v1.2.3). Tag locally with `git tag v1.0.0 && git push --tags`.
#
# Requires:
# * NPM_TOKEN repo secret — automation token from npmjs.com (Settings ->
#   Access Tokens -> Generate New Token -> Automation). One-time setup.
# * Package name `playstore-flow` already published once (or workflow
#   creates it on first run if the token has publish rights).
#
# Provenance is enabled via publishConfig in package.json; the workflow
# needs id-token: write permission to mint the OIDC token Sigstore signs.
on:
  push:
    tags:
      - 'v*'
  # Manual run from the Actions tab.
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for npm provenance attestations
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify package.json version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION). Bump and re-tag."
            exit 1
          fi

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
